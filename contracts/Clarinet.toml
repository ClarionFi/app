[project]
name = "contracts"
description = ""
authors = []
telemetry = true
cache_dir = "./.cache"

[contracts.sip-010-trait-v2]
path = "contracts/sip-010-trait.clar"
epoch = "latest"

[contracts.mock-ft-v2]
path = "contracts/mock-ft.clar"
depends_on = ["sip-010-trait-v2"]
epoch = "latest"

[contracts.clarion-oracle-v2]
path = "contracts/clarion-oracle.clar"
epoch = "latest"

[contracts.clarion-pool-v2]
path = "contracts/clarion-pool.clar"
depends_on = ["sip-010-trait-v2", "clarion-oracle-v2"]
epoch = "latest"

# Check-checker settings:
# trusted_sender: if true, inputs are trusted after tx_sender has been checked.
# trusted_caller: if true, inputs are trusted after contract-caller has been checked.
# callee_filter: if true, untrusted data may be passed into a private function without a
# warning, if it gets checked inside. This check will also propagate up to the
# caller.
# More informations: https://www.hiro.so/blog/new-safety-checks-in-clarinet

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = true, trusted_caller = false, callee_filter = false }

[repl.analysis.lints]
noop = "warning"
unused_const = "warning"
unused_data_var = "warning"
unused_map = "warning"
unused_private_fn = "warning"
unused_token = "warning"
unused_trait = "warning"
unused_binding = "warning"
error_const = "notice"
case_const = "notice"
unnecessary_public = "notice"
case_binding = "notice"

[repl.analysis.lint_groups]
all = true
style = "notice"
unused = "warning"
